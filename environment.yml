name: wan_sr
channels:
  - conda-forge
  - gurobi
  - defaults
dependencies:
  - python
  - numpy=1.20.3
  - networkit       
  - networkx=2.5.1       
  - scipy=1.6.3
  - matplotlib
  - seaborn
  - pandas=1.3.3
  - gurobi        
  - pip
  - pip:
      - gurobipy          # explicit pip fallback if gurobi conda package is unavailable
