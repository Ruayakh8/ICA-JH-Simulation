name: wan_sr
channels:
  - conda-forge
  - gurobi
  - defaults
dependencies:
  - python
  - numpy=1.20.3
  - networkit       # graph algorithms and ECMP routing (ICA-JH, HeurOSPF, GWO)
  - networkx=2.5.1       # topology parsing (.graphml files)
  - scipy=1.6.3
  - matplotlib
  - seaborn
  - pandas=1.3.3
  - gurobi        # installs gurobipy; required for segment_ilp and MCF demand generation
  - pip
  - pip:
      - gurobipy          # explicit pip fallback if gurobi conda package is unavailable
